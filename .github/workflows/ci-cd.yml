name: SIEM Platform CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # 1. Backend Build and Test Stage
  build-backend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven
      run: |
        cd backend
        mvn -B clean package

    - name: Archive build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: backend-jar
        path: backend/target/*.jar

  # 2. Frontend Build and Test Stage
  build-frontend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install dependencies
      run: |
        cd frontend
        npm ci

    - name: Compile and Build React Assets
      run: |
        cd frontend
        npm run build

    - name: Archive static assets
      uses: actions/upload-artifact@v4
      with:
        name: frontend-dist
        path: frontend/dist

  # 3. Containerization and Security Scan Stage
  docker-build-and-scan:
    needs: [build-backend, build-frontend]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Download Backend JAR
      uses: actions/download-artifact@v4
      with:
        name: backend-jar
        path: backend/target

    - name: Download Frontend Dist
      uses: actions/download-artifact@v4
      with:
        name: frontend-dist
        path: frontend/dist

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Backend Docker Image
      run: |
        docker build -f docker/backend.Dockerfile -t siem-backend:latest ./backend

    - name: Build Frontend Docker Image
      run: |
        docker build -f docker/frontend.Dockerfile -t siem-frontend:latest ./frontend

