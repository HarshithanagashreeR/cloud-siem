databases:
  - name: siem-db
    plan: free
    databaseName: siem
    user: postgres

services:
  # 1. Spring Boot Backend Service (Dockerized)
  - type: web
    name: siem-backend
    runtime: docker
    dockerfilePath: docker/backend.Dockerfile
    dockerContext: backend
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: siem-db
          property: connectionString
      - key: DATABASE_USERNAME
        value: postgres
      - key: DATABASE_PASSWORD
        value: postgrespassword
      - key: REDIS_HOST
        fromService:
          type: redis
          name: siem-redis
          property: host
      - key: REDIS_PORT
        fromService:
          type: redis
          name: siem-redis
          property: port
      - key: JWT_SECRET
        generateValue: true
      - key: AI_PROVIDER
        value: gemini
      - key: AI_API_KEY
        value: mock_ai_key
      - key: AWS_REGION
        value: us-east-1
      - key: AWS_ACCESS_KEY_ID
        value: mock_key
      - key: AWS_SECRET_ACCESS_KEY
        value: mock_secret

  # 2. Redis Key-Value Store & Rate Limiter
  - type: redis
    name: siem-redis
    plan: free
    ipAllowList: []

  # 3. React Frontend Static Site
  - type: web
    name: siem-frontend
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    plan: free
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: siem-backend
          property: url
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
