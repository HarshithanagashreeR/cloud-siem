databases:
  - name: siem-db
    plan: free
    databaseName: siem
    user: siem_admin

services:
  # 1. Spring Boot Backend Service (Dockerized)
  - type: web
    name: siem-backend
    runtime: docker
    dockerfilePath: docker/backend.Dockerfile
    dockerContext: backend
    plan: free
    envVars:
      - key: DATABASE_URL
        value: jdbc:postgresql://siem-db:5432/siem
      - key: DATABASE_USERNAME
        fromDatabase:
          name: siem-db
          property: user
      - key: DATABASE_PASSWORD
        fromDatabase:
          name: siem-db
          property: password
      - key: REDIS_HOST
        fromService:
          type: redis
          name: siem-redis
          property: host
      - key: REDIS_PORT
        fromService:
          type: redis
          name: siem-redis
          property: port
      - key: JWT_SECRET
        generateValue: true
      - key: AI_PROVIDER
        value: gemini
      - key: AI_API_KEY
        value: mock_ai_key
      - key: AWS_REGION
        value: us-east-1
      - key: AWS_ACCESS_KEY_ID
        value: mock_key
      - key: AWS_SECRET_ACCESS_KEY
        value: mock_secret

  # 2. Redis Key-Value Store & Rate Limiter
  - type: redis
    name: siem-redis
    plan: free
    ipAllowList: []

  # 3. React Frontend Static Site
  - type: web
    name: siem-frontend
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    plan: free
    envVars:
      - key: VITE_API_BASE_URL
        value: https://siem-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
